default:
  # Training hyperparameters
  lr: 0.001
  wd: 0.00001
  epochs: 200
  patience: 50

  # Checkpoint settings
  save_every: null  # Save checkpoint every N epochs (null = disabled, only save best/last)
  save_every_batch: null  # Save checkpoint every N batches (null = disabled, for large datasets)

  # Training mode configuration
  mini_batch: false  # Whether to use mini-batch training

  # Evaluation metrics
  label_metrics: ['NMI', 'ARI', 'ACC', 'F1', 'Homo', 'Comp']
  struct_metrics: ['Mod', 'Cond']

  # GNN architecture
  gnn_type: gcn  # Options: gcn, sage, gat, gatv2, gin

  # Model architecture
  hidden_channels: 64
  num_layers: 2
  dropout: 0.0
  act: relu
  act_first: false
  act_last: false
  norm: null  # Options: null/none, batch_norm, layer_norm
  residual: false
  pre_linear: false
  jk: null  # Options: null, last, cat, max, lstm

  # GNN-specific parameters
  # GCN
  add_self_loops: null
  normalize: true
  improved: false
  cached: true  # transductive

  # GraphSAGE
  aggr: mean  # Options: mean, max, sum
  project: false

  # GAT/GATv2
  heads: 1
  concat: true
  negative_slope: 0.2

  # GIN
  train_eps: false

  # NS4GC-specific parameters
  p_fm1: 0.1  # Feature masking probability for view 1
  p_ed1: 0.1  # Edge dropping probability for view 1
  p_fm2: 0.1  # Feature masking probability for view 2
  p_ed2: 0.1  # Edge dropping probability for view 2
  s: 0.6      # Similarity threshold for node similarity matrix
  tau: 0.1    # Temperature parameter for sparsity loss
  lam: 1.0    # Weight for neighbor alignment loss
  gam: 1.0    # Weight for sparsity loss

  # Mini-batch training parameters
  fan_out: 10
  batch_size: 16384
  num_workers: 8

  # Inference configuration
  force_full_batch_inference: false  # Try full-batch inference even if mini_batch=true
  allow_cpu_fallback: true  # Allow fallback to CPU full-batch if GPU OOM
  infer_batch_size: 256  # If null, use batch_size; can be larger than batch_size
  infer_fan_out: -1  # -1 means sample all neighbors

  # K-Means clustering parameters
  kmeans_backend: torch  # Options: torch, triton, sklearn
  kmeans_n_init: 10
  kmeans_max_iter: 300
  normalize_embeddings: true  # Whether to normalize embeddings before clustering

