default:
  lr: 0.001
  wd: 1.0e-05
  epochs: 200
  patience: 50
  save_every: null
  save_every_batch: null
  mini_batch: false
  # mini_batch=false: num_layers mainly controls the backbone GNN depth.
  # mini_batch=true: num_layers also controls NeighborLoader sampling depth,
  # so batch-local semantic-frequency / k-hop style signals may be truncated
  # if num_layers is smaller than the intended filter_k / num_hops.
  label_metrics:
  - NMI
  - ARI
  - ACC
  - F1
  - Homo
  - Comp
  struct_metrics:
  - Mod
  - Cond
  gnn_type: gcn
  hidden_channels: 64
  num_layers: 2
  dropout: 0.0
  act: relu
  act_first: false
  act_last: false
  norm: null
  residual: false
  pre_linear: false
  jk: null
  add_self_loops: null
  normalize: true
  improved: false
  cached: true
  aggr: mean
  project: false
  heads: 1
  concat: true
  negative_slope: 0.2
  train_eps: false
  p_fm1: 0.1
  p_ed1: 0.1
  p_fm2: 0.1
  p_ed2: 0.1
  s: 0.6
  tau: 0.1
  lam: 1.0
  gam: 1.0
  fan_out: 10
  batch_size: 16384
  num_workers: 8
  force_full_batch_inference: false
  allow_cpu_fallback: true
  infer_batch_size: 256
  infer_fan_out: -1
  kmeans_backend: torch
  kmeans_n_init: 10
  kmeans_max_iter: 300
  normalize_embeddings: true
