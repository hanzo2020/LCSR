ArXiv:
  mini_batch: true
  gnn_type: sage
  epochs: 200
  hidden_channels: 256
  num_layers: 3
  # Historical ArXiv LCSR runs used filter_k=4 for semantic-frequency
  # descriptors and candidate-bank construction. If omitted, current code
  # falls back to 2 and noticeably shifts the route behavior.
  num_hops: 4
  batch_size: 16384
  infer_batch_size: 256
  infer_fan_out: -1
  force_full_batch_inference: true
  allow_cpu_fallback: true
  norm: batch_norm
  s: 0.6
  tau: 0.1
  lam: 1.0
  gam: 1.0
  p_fm1: 0.0
  p_ed1: 0.4
  p_fm2: 0.0
  p_ed2: 0.4
  # LCSR frozen ArXiv search best (arxiv_034):
  # - fcrs_extra_k: max extra positive pairs used by the latent positive loss path.
  # - lcsr_kmax: per-anchor dynamic rectification budget after margin / rho filtering.
  # - candidate-bank frontier / hop expansion is an internal retrieval setting
  #   (current batch-local bank build uses filter_k=4) and is not the same as either k above.
  fcrs_extra_lambda: 0.005
  fcrs_extra_warmup: 25
  fcrs_extra_k: 1
  lcsr_support_source: freq
  lcsr_positive_mode: linear
  lcsr_positive_quantile: null
  lcsr_positive_margin: null
  lcsr_margin: 0.15
  lcsr_rho: 0.25
  lcsr_kmax: 4
  lcsr_candidate_pool_size: 48
  lcsr_use_gate: false
  lcsr_force_batch_local: true
  lcsr_batch_local_semantics: candidate_bank_v2
  lcsr_candidate_bank_size: 64
  lcsr_v3_variant: degree_shrink
  lcsr_add_score: global
  lcsr_budget_match: true
  lcsr_reliability_mode: full
  lcsr_plus_weight_mode: uniform
